# rules/60_system_secrets.yml
# This file is not about PII. It's about the fact that "make a copy of
# prod for developers" and "hand out live credentials to third-party
# services" are two very different things that a naive backup+restore
# conflates. `odoo-bin db load --neutralize` handles *operational*
# safety (disables outgoing mail, cron, payment providers at runtime)
# — it does NOT scrub the credential values sitting in the DB. Both
# layers are needed; this file is the second one.

ir.config_parameter:
  match_by_key_regex: "(?i)(secret|token|key|password|api_key|access_key|client_secret)"
  strategy: drop
  always_rotate_regardless_of_match:
    database.secret:
      strategy: rotate_secret
      note: >
        Signs session cookies and password-reset tokens. Carrying the
        real value over means a masked dev DB could still be used to
        forge valid signed tokens if it were ever network-reachable.
        Generate a fresh random value, don't derive it from the source.
    database.uuid:
      strategy: rotate_secret
      note: >
        Odoo's own registration identity, used by IAP/enterprise
        licensing pings and Odoo's online services. Rotating this also
        prevents the dev copy from being mistaken for the real
        instance by anything that keys off database.uuid.

ir.mail_server:
  fields:
    smtp_user:              { strategy: drop }
    smtp_pass:               { strategy: drop }

fetchmail.server:
  fields:
    user:                   { strategy: drop }
    password:                { strategy: drop }

iap.account:
  fields:
    account_token:            { strategy: rotate_secret, note: "Real IAP credit tokens. Leaving these in risks a dev/test cron accidentally billing production SMS/IAP credits if operational neutralization is ever incomplete." }

auth_oauth.provider:
  fields:
    client_secret:              { strategy: drop }

res.users:
  fields:
    oauth_uid:                    { strategy: drop, note: "Duplicated here from 10_core.yml for visibility — this is a security-hygiene concern, not just a PII one." }
    oauth_access_token:             { strategy: drop }

website.visitor:
  fields:
    access_token:                 { strategy: rotate_secret }
    # if a geo/ip field is present in your version, drop it — same
    # reasoning as res.users.log.ip in 10_core.yml.
