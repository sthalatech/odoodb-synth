# .github/workflows/ci.yml
#
# Runs on every PR (and push to main):
#   1. odoo-synth rules validate -- the cheapest gate, no DB needed.
#   2. pytest tests/unit/ -- layer 1 (rulebook, no DB) + layer 2 (SQL
#      functions, needs the postgres-anon scratch container).
#
# Integration tests (tests/integration/) need both the postgres-anon and
# Odoo containers and are intentionally NOT in this workflow per
# TESTING.md -- they're slow and spin real containers. Run them manually
# or in a separate nightly job (P1 item #13 / TESTING.md section 3-4).

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rulebook-and-unit:
    runs-on: ubuntu-latest
    services:
      postgres-anon:
        # Pinned tag -- see docker/docker-compose.scratch.yml.
        image: registry.gitlab.com/dalibo/postgresql_anonymizer:3.1.3
        env:
          POSTGRES_USER: odoo_synth
          POSTGRES_PASSWORD: odoo_synth
          POSTGRES_DB: scratch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U odoo_synth -d scratch"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      SCRATCH_DB_URL: postgresql://odoo_synth:odoo_synth@localhost:5432/scratch

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install odoo-synth (editable) + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Load SQL bootstrap functions into scratch DB
        run: |
          psql "$SCRATCH_DB_URL" -f sql/bootstrap.sql
        env:
          PGPASSWORD: odoo_synth

      - name: Rulebook validation
        run: odoo-synth rules validate --rules rules/

      - name: Unit tests (rulebook + SQL functions)
        run: pytest tests/unit/ -v
